<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.3.10/dist/purify.min.js"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .message-bubble { max-width: min(calc(100% - 2rem), 48rem); word-wrap: break-word; }
        body { font-family: 'Inter', sans-serif; }
        .message-content pre { background-color: #f3f4f6; color: #1f2937; padding: 0.8rem; border-radius: 0.5rem; overflow-x: auto; font-family: monospace; font-size: 0.875em; }
        .dark .message-content pre { background-color: #1f2937; color: #f9fafb; }
        .message-content code:not(pre code) { background-color: #e5e7eb; color: #ef4444; padding: 0.1em 0.3em; border-radius: 0.25rem; font-size: 0.9em; }
        .dark .message-content code:not(pre code) { background-color: #374151; color: #fda4af; }
        .message-content ul, .message-content ol { padding-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .message-content ul { list-style-type: disc; }
        .message-content ol { list-style-type: decimal; }
        .message-content blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; margin-left: 0; font-style: italic; color: #6b7280; }
        .dark .message-content blockquote { border-left-color: #4b5563; color: #9ca3af; }
        .message-content a { color: #3b82f6; text-decoration: underline; }
        .dark .message-content a { color: #60a5fa; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 font-sans">
    <div class="flex flex-col h-full">
        <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4 flex items-center justify-between">
            <div class="flex items-center">
                <button id="menu-btn" class="lg:hidden mr-4 text-gray-600 dark:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 dark:text-white">ChatGPT</h1>
            </div>
            <select id="model-select" class="bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white px-4 py-2 rounded-lg text-sm">
                <!-- Options populated by JS -->
            </select>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside id="sidebar" class="bg-white dark:bg-gray-800 w-64 border-r dark:border-gray-700 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 fixed lg:relative h-full z-20 flex flex-col">
                <div class="p-4">
                    <button id="new-chat" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-lg flex items-center text-sm">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        New Chat
                    </button>
                    <div class="mt-4">
                        <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
                        <label for="image-upload" class="cursor-pointer flex items-center text-gray-600 dark:text-gray-400 hover:text-blue-500 transition-colors text-sm">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            Upload Images
                        </label>
                    </div>
                </div>
                 <div class="flex-1 overflow-y-auto p-4 border-t dark:border-gray-700">
                     <h2 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">History</h2>
                     <div id="chat-history" class="space-y-1">
                         <p class="text-xs text-gray-400 dark:text-gray-500">No history yet.</p>
                     </div>
                 </div>
            </aside>

            <main class="flex-1 flex flex-col overflow-hidden">
                <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <div class="text-center text-gray-500 dark:text-gray-400 py-8">Start a new conversation</div>
                </div>
                <div class="bg-white dark:bg-gray-800 border-t dark:border-gray-700 p-4">
                    <div id="image-preview" class="flex gap-2 mb-2 overflow-x-auto pb-2"></div>
                    <div class="relative message-bubble mx-auto flex items-center gap-2">
                        <label for="image-upload" title="Upload Images" class="cursor-pointer text-gray-500 dark:text-gray-400 hover:text-blue-500 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
                            </svg>
                        </label>
                        <textarea id="user-input" rows="1"
                            class="flex-1 bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white rounded-2xl py-2 px-4 resize-none overflow-hidden border border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Type your message..."
                            style="max-height: 200px"></textarea>
                        <button id="send-btn" title="Send Message" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-full disabled:opacity-50 disabled:cursor-not-allowed transition-opacity" disabled>
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                               <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 16.571V11.5a1 1 0 112 0v5.071a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const config = {
            MAX_INPUT_LENGTH: 4000,
            API_ENDPOINT: "https://text.pollinations.ai/openai/v1/chat/completions",
            MODELS: {
                'openai-large': { name: 'OpenAI Large', premium: true },
                'openai': { name: 'OpenAI', premium: false },
                'qwen-reasoning': { name: 'Qwen Reasoning', premium: false },
                'gemini': { name: 'Gemini', premium: true },
                'gemini-thinking': { name: 'Gemini Thinking', premium: true },
            },
        };

        const VISION_MODELS = ['openai-large', 'openai']; // Models supporting image input

        // --- DOM Elements ---
        const elements = {
            chatBox: document.getElementById('chat-box'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            newChatBtn: document.getElementById('new-chat'),
            modelSelect: document.getElementById('model-select'),
            imageUpload: document.getElementById('image-upload'),
            sidebar: document.getElementById('sidebar'),
            menuBtn: document.getElementById('menu-btn'),
            imagePreview: document.getElementById('image-preview'),
            chatHistory: document.getElementById('chat-history')
        };

        // --- Populate Model Select Dropdown ---
        function populateModelSelect() {
            elements.modelSelect.innerHTML = '';
            const modelKeys = Object.keys(config.MODELS);
            const orderedKeys = [
                'openai-large', 'openai',
                ...modelKeys.filter(k => k !== 'openai-large' && k !== 'openai')
            ];
            orderedKeys.forEach(modelId => {
                 if (config.MODELS[modelId]) {
                    const option = document.createElement('option');
                    option.value = modelId;
                    option.textContent = config.MODELS[modelId].name + (config.MODELS[modelId].premium ? ' ✨' : '');
                    elements.modelSelect.appendChild(option);
                 }
            });
            if (orderedKeys.length > 0 && config.MODELS[orderedKeys[0]]) {
                elements.modelSelect.value = orderedKeys[0];
            } else if (modelKeys.length > 0) {
                 elements.modelSelect.value = modelKeys[0];
            }
        }

        // --- Application State ---
        let state = {
            isProcessing: false,
            messages: JSON.parse(localStorage.getItem('chatMessages') || '[]'),
            uploadedImages: [],
            currentAbortController: null
        };

        // --- Security & Utilities ---
        const security = {
            basicSanitize: (input) => { // For intermediate display
                if (typeof input !== 'string') return '';
                const temp = document.createElement('div');
                temp.textContent = input;
                return temp.innerHTML.replace(/\n/g, '<br>');
            },
            renderMarkdown: (markdownContent) => { // For final display
                if (typeof markdownContent !== 'string') return '';
                try {
                    // Ensure marked is loaded
                    if (typeof marked === 'undefined') {
                        console.error('Marked library is not loaded!');
                        return security.basicSanitize(markdownContent);
                    }
                     // Ensure DOMPurify is loaded
                    if (typeof DOMPurify === 'undefined') {
                        console.error('DOMPurify library is not loaded!');
                        return security.basicSanitize(markdownContent); // Still sanitize minimally
                    }

                    const rawHtml = marked.parse(markdownContent, { breaks: true, gfm: true });
                    const cleanHtml = DOMPurify.sanitize(rawHtml, { USE_PROFILES: { html: true }, ADD_ATTR: ['target'] });
                     const tempDiv = document.createElement('div');
                     tempDiv.innerHTML = cleanHtml;
                     tempDiv.querySelectorAll('a').forEach(a => {
                         if (a.href && !a.target) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
                     });
                     return tempDiv.innerHTML;
                } catch (error) {
                    console.error("Markdown rendering error:", error);
                    return security.basicSanitize(markdownContent); // Fallback
                }
            },
            validateInput: (input) => {
                if (input.length > config.MAX_INPUT_LENGTH) {
                    throw new Error(`Input exceeds ${config.MAX_INPUT_LENGTH} characters`);
                }
                return true;
            },
        };

        // --- UI Management ---
        const ui = {
            createMessageElement: (content, isUser = false, role = 'assistant') => {
                const messageWrapper = document.createElement('div');
                messageWrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`;
                const bubble = document.createElement('div');
                bubble.className = `message-bubble rounded-2xl p-3 text-sm shadow-sm ${isUser ? 'ml-auto bg-blue-500 text-white' : 'bg-white dark:bg-gray-700 text-gray-900 dark:text-white'}`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content flex flex-col gap-2';

                if (role === 'error') {
                     bubble.classList.remove('bg-white', 'dark:bg-gray-700');
                     bubble.classList.add('bg-red-100', 'dark:bg-red-900', 'text-red-700', 'dark:text-red-300', 'border', 'border-red-200', 'dark:border-red-700');
                     contentDiv.innerHTML = `⚠️ ${security.basicSanitize(content)}`;
                 } else if (Array.isArray(content)) { // User message
                    content.forEach(item => {
                        if (item.type === 'text') {
                            const textEl = document.createElement('div');
                            // Use basic sanitize for user input display as it's not expected to be markdown
                            textEl.innerHTML = security.basicSanitize(item.text || "");
                            contentDiv.appendChild(textEl);
                        } else if (item.type === 'image_url' && item.image_url?.url) {
                            const img = document.createElement('img');
                            img.src = item.image_url.url;
                            img.alt = "User uploaded image";
                            img.className = 'max-w-xs h-auto rounded-lg mt-1 border dark:border-gray-600';
                            img.style.maxHeight = '200px';
                            contentDiv.appendChild(img);
                        }
                    });
                } else if (typeof content === 'string') { // Assistant message or placeholder
                     if (content === '▍' || role === 'loading') {
                         contentDiv.innerHTML = content; // Raw cursor or loading text
                     } else if (role === 'assistant') {
                         // Render markdown for completed assistant messages
                         contentDiv.innerHTML = security.renderMarkdown(content);
                     } else {
                         // Fallback for any other string content (should be rare)
                         contentDiv.innerHTML = security.basicSanitize(content);
                     }
                }

                bubble.appendChild(contentDiv);
                messageWrapper.appendChild(bubble);
                return messageWrapper;
            },
             createStreamingMessageElement: () => {
                const element = ui.createMessageElement('▍', false, 'loading');
                element.id = 'streaming-message';
                elements.chatBox.appendChild(element);
                ui.scrollToBottom();
                return element;
            },
             updateStreamingMessage: (element, accumulatedContent, isFinished = false) => {
                 const contentDiv = element.querySelector('.message-content');
                 if (!contentDiv) return;
                 if (isFinished) {
                     // Render final markdown only once when finished
                     contentDiv.innerHTML = security.renderMarkdown(accumulatedContent);
                 } else {
                     // During streaming, show sanitized text + cursor for smoothness
                     contentDiv.innerHTML = security.basicSanitize(accumulatedContent) + '▍';
                 }
                 ui.scrollToBottom();
            },
             showTemporaryLoading: (message = 'Thinking...') => {
                 const loadingId = 'temp-loading-' + Date.now();
                 const loadingElement = ui.createMessageElement(message + '...', false, 'loading');
                 loadingElement.id = loadingId;
                 loadingElement.classList.add('opacity-75');
                 elements.chatBox.appendChild(loadingElement);
                 ui.scrollToBottom();
                 setTimeout(() => {
                    const el = document.getElementById(loadingId);
                    if (el) el.remove();
                 }, 2500);
                 return loadingElement;
            },
             removeElementById: (id) => {
                 const el = document.getElementById(id);
                 if (el) el.remove();
            },
            updateModelIndicator: () => {
                // Ensure modelSelect has a value before accessing config
                if (!elements.modelSelect.value || !config.MODELS[elements.modelSelect.value]) {
                     console.warn("Model selection not yet initialized or invalid value.");
                     document.title = "ChatGPT Clone"; // Default title
                     return;
                 }
                const selectedModel = config.MODELS[elements.modelSelect.value];
                document.title = `${selectedModel.name} - ChatGPT Clone`;
            },
            scrollToBottom: () => {
                // Use smooth scrolling
                elements.chatBox.scrollTo({ top: elements.chatBox.scrollHeight, behavior: 'smooth' });
            },
            toggleSendButton: (enabled) => {
                elements.sendBtn.disabled = !enabled;
            },
            clearInput: () => {
                 elements.userInput.value = '';
                 state.uploadedImages = [];
                 elements.imagePreview.innerHTML = '';
                 ui.adjustTextAreaHeight();
                 ui.toggleSendButton(false);
            },
            adjustTextAreaHeight: () => {
                elements.userInput.style.height = 'auto';
                const maxHeight = parseInt(elements.userInput.style.maxHeight || '200px', 10);
                const scrollHeight = elements.userInput.scrollHeight;
                const newHeight = Math.min(scrollHeight, maxHeight) + (scrollHeight > maxHeight ? 0 : 2); // Add couple pixels buffer
                elements.userInput.style.height = `${newHeight}px`;
            },
             displayError: (message) => {
                 const errorDiv = ui.createMessageElement(message, false, 'error');
                 elements.chatBox.appendChild(errorDiv);
                 ui.scrollToBottom();
            },
             addImagePreview: (name, src) => {
                const container = document.createElement('div');
                container.className = 'relative group flex-shrink-0';
                const img = document.createElement('img');
                img.src = src; img.alt = name; img.title = name;
                img.className = 'w-16 h-16 object-cover rounded-lg border border-gray-300 dark:border-gray-600 cursor-pointer';
                img.onclick = () => window.open(src, '_blank');
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '&times;'; removeBtn.title = "Remove image";
                removeBtn.className = 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity focus:opacity-100';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    state.uploadedImages = state.uploadedImages.filter(img => img.base64 !== src);
                    container.remove();
                    if (elements.userInput.value.trim() === '' && state.uploadedImages.length === 0) ui.toggleSendButton(false);
                    if (state.uploadedImages.length === 0) elements.imageUpload.value = '';
                };
                container.appendChild(img); container.appendChild(removeBtn);
                elements.imagePreview.appendChild(container);
                ui.toggleSendButton(true);
            },
             updateChatHistoryUI: () => {
                 // Placeholder for future chat history implementation
                 console.log("UI: Update chat history display (not implemented)");
                 // Example: Clear and add placeholder if needed
                 // elements.chatHistory.innerHTML = '<p class="text-xs text-gray-400 dark:text-gray-500">No history yet.</p>';
             }
        };

        // --- Chat Logic ---
        const chat = {
            sendMessage: async () => {
                if (state.isProcessing) return;

                let userMessageText = elements.userInput.value.trim();
                let messageContent = [];

                if (!userMessageText && state.uploadedImages.length === 0) return;

                state.isProcessing = true;
                ui.toggleSendButton(false);

                // --- Construct User Message ---
                const selectedModel = elements.modelSelect.value;
                const supportsVision = VISION_MODELS.includes(selectedModel);

                if (state.uploadedImages.length > 0) {
                    if (!supportsVision) {
                        ui.displayError(`Model '${config.MODELS[selectedModel].name}' does not support image input.`);
                        state.isProcessing = false;
                        ui.toggleSendButton(elements.userInput.value.trim() !== '' || state.uploadedImages.length > 0);
                        return;
                    }
                    state.uploadedImages.forEach(img => {
                        messageContent.push({ type: 'image_url', image_url: { url: img.base64, detail: "auto" } });
                    });
                }

                if (userMessageText) {
                     try {
                         security.validateInput(userMessageText);
                         messageContent.push({ type: 'text', text: userMessageText });
                     } catch (error) {
                         ui.displayError(error.message);
                         state.isProcessing = false;
                         ui.toggleSendButton(true);
                         return;
                     }
                }

                const userMsgObj = { role: 'user', content: messageContent };
                state.messages.push(userMsgObj);

                // --- Update UI (User Message) ---
                if (elements.chatBox.querySelector('.text-center')) {
                     elements.chatBox.innerHTML = '';
                }
                const messageDiv = ui.createMessageElement(messageContent, true, 'user');
                elements.chatBox.appendChild(messageDiv);
                ui.clearInput();
                ui.scrollToBottom();

                // --- Prepare for API Call ---
                localStorage.setItem('chatMessages', JSON.stringify(state.messages));
                const assistantMessageDiv = ui.createStreamingMessageElement();
                let assistantMessageContent = '';

                state.currentAbortController = new AbortController();
                try {
                    console.log('Sending messages to API:', JSON.stringify(state.messages, null, 2));

                    const response = await fetch(config.API_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: elements.modelSelect.value,
                            messages: state.messages,
                            stream: true,
                        }),
                        signal: state.currentAbortController.signal
                    });

                    if (!response.ok) {
                        // Attempt to read error body for more details
                        let errorBody = await response.text();
                        try { // Try parsing as JSON if possible
                             errorBody = JSON.stringify(JSON.parse(errorBody), null, 2);
                         } catch (e) { /* ignore if not JSON */ }
                        console.error("API Error Response Body:", errorBody);
                        throw new Error(`API Error: ${response.status} ${response.statusText}. See console for details.`);
                    }
                    const contentType = response.headers.get('content-type');
                    if (!contentType || !contentType.includes('text/event-stream') || !response.body) {
                        throw new Error('Expected a streaming response (text/event-stream) but received something else.');
                    }

                    // --- Process Streaming Response ---
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) {
                            console.log('Stream finished.');
                            break; // Exit the while loop when the stream is fully read
                        }

                        buffer += decoder.decode(value, { stream: true });
                        let lines = buffer.split('\n');
                        buffer = lines.pop() || ''; // Keep potential partial line

                        for (const line of lines) { // Process each complete line
                            if (!line.startsWith('data: ')) continue; // Skip empty lines/comments
                            const data = line.substring(6); // Remove "data: " prefix

                            if (data === '[DONE]') {
                                console.log('Received explicit [DONE] message.');
                                // No need to break here, the reader finishing is the definitive end
                                continue;
                            }

                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices?.[0]?.delta;
                                if (!delta) continue; // Skip if no delta in this chunk

                                if (delta.content) {
                                    assistantMessageContent += delta.content;
                                    // Update UI incrementally with sanitized text + cursor
                                    ui.updateStreamingMessage(assistantMessageDiv, assistantMessageContent, false);
                                }

                            } catch (e) {
                                console.error('Error parsing stream chunk JSON:', data, e);
                                // Maybe display a warning in UI? For now, just log it.
                            }
                        } // End for loop (lines)
                    } // End while loop (reader)

                    // --- Finalize Assistant Message ---
                    assistantMessageDiv.id = ''; // Remove streaming ID
                    // Perform final render with Markdown
                    ui.updateStreamingMessage(assistantMessageDiv, assistantMessageContent, true);

                    const finalAssistantMessage = { role: 'assistant', content: assistantMessageContent };

                    // Only add to history if there was actual content received
                    if (finalAssistantMessage.content) {
                         state.messages.push(finalAssistantMessage);
                         localStorage.setItem('chatMessages', JSON.stringify(state.messages));
                    } else {
                        console.warn("Stream ended, but no content was received for the final assistant message.");
                        // Remove the placeholder bubble if it's empty
                        assistantMessageDiv.remove();
                    }

                } catch (error) {
                    console.error('Error during API call or streaming:', error);
                     // Ensure placeholder is removed if an error occurred during streaming/setup
                     if(assistantMessageDiv && document.body.contains(assistantMessageDiv)){
                         assistantMessageDiv.remove();
                     }
                    // Differentiate between user abort and actual errors
                    if (error.name !== 'AbortError') {
                        // Display a user-friendly error message
                        ui.displayError(error.message || "An unknown error occurred.");
                    } else {
                        console.log("Request aborted by user or new request.");
                        // Optionally add a message indicating cancellation, though usually not needed
                    }
                } finally {
                    state.isProcessing = false; // Allow sending again
                    // Re-enable button based on current input state
                    ui.toggleSendButton(elements.userInput.value.trim() !== '' || state.uploadedImages.length > 0);
                    state.currentAbortController = null; // Clear controller
                    // Ensure scroll happens even after errors/completion
                    ui.scrollToBottom();
                }
            }, // end sendMessage

        }; // end chat object

        // --- Event Listeners ---
        elements.sendBtn.addEventListener('click', () => chat.sendMessage());
        elements.userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chat.sendMessage(); }
        });
        elements.userInput.addEventListener('input', ui.adjustTextAreaHeight);
        elements.userInput.addEventListener('input', () => {
            ui.toggleSendButton(elements.userInput.value.trim() !== '' || state.uploadedImages.length > 0);
        });
        elements.newChatBtn.addEventListener('click', () => {
            if (state.currentAbortController) { state.currentAbortController.abort(); }
            state.messages = []; state.uploadedImages = [];
            localStorage.removeItem('chatMessages');
            elements.chatBox.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8">Start a new conversation</div>';
            ui.clearInput(); ui.updateModelIndicator(); ui.updateChatHistoryUI();
            console.log("New chat started.");
        });
        elements.imageUpload.addEventListener('change', (e) => {
            const files = e.target.files; if (!files || files.length === 0) return;
            const maxImages = 5; const maxSizeMB = 10;
            if (state.uploadedImages.length + files.length > maxImages) { ui.displayError(`Max ${maxImages} images allowed.`); elements.imageUpload.value = ''; return; }
            const selectedModel = elements.modelSelect.value;
             if (!VISION_MODELS.includes(selectedModel)) { ui.displayError(`Model '${config.MODELS[selectedModel]?.name || selectedModel}' doesn't support images.`); elements.imageUpload.value = ''; return; }
            Array.from(files).forEach(file => {
                 if (!file.type.startsWith('image/')) return;
                 if (file.size > maxSizeMB * 1024 * 1024) { ui.displayError(`Image "${file.name}" > ${maxSizeMB}MB.`); return; }
                 if (state.uploadedImages.length >= maxImages) return;
                const reader = new FileReader();
                reader.onload = (event) => { if (state.uploadedImages.length < maxImages) { state.uploadedImages.push({ name: file.name, base64: event.target.result }); ui.addImagePreview(file.name, event.target.result); } };
                 reader.onerror = (error) => { ui.displayError(`Error reading ${file.name}.`); }; reader.readAsDataURL(file);
            });
             elements.imageUpload.value = '';
        });
        elements.menuBtn.addEventListener('click', () => { elements.sidebar.classList.toggle('-translate-x-full'); });
        elements.modelSelect.addEventListener('change', () => {
            ui.updateModelIndicator();
             if (state.uploadedImages.length > 0 && !VISION_MODELS.includes(elements.modelSelect.value)) { ui.displayError(`Warning: Selected model doesn't support images.`); }
        });

        // --- Initial Load ---
        const loadSavedMessages = () => {
             // Filter out potential 'tool' messages from older versions if they exist
             state.messages = (JSON.parse(localStorage.getItem('chatMessages') || '[]')).filter(msg => msg.role !== 'tool');
             localStorage.setItem('chatMessages', JSON.stringify(state.messages)); // Save cleaned history

             if (state.messages.length > 0) {
                 elements.chatBox.innerHTML = ''; // Clear initial message
                 state.messages.forEach(msg => {
                     let displayContent = msg.content;
                     // Standardize user message content format
                     if (msg.role === 'user' && !Array.isArray(msg.content)) {
                         displayContent = [{ type: 'text', text: msg.content || "" }];
                     } else if (msg.role === 'user' && Array.isArray(msg.content)) {
                         // Ensure text parts within user array content are not null
                         displayContent = msg.content.map(item =>
                             (item.type === 'text' && (item.text === null || typeof item.text === 'undefined')) ? { ...item, text: "" } : item
                         );
                     }
                     // Assistant content is expected to be a string (markdown)
                     else if (msg.role === 'assistant') {
                         displayContent = msg.content || ""; // Ensure it's at least an empty string
                     }

                     // Skip rendering if message role is unrecognized or content is invalid after processing
                     if (!displayContent && msg.role !== 'user') { // Allow empty user text message, but not others
                          console.warn("Skipping message with potentially invalid content:", msg);
                          return;
                     }

                    const messageDiv = ui.createMessageElement(displayContent, msg.role === 'user', msg.role);
                    elements.chatBox.appendChild(messageDiv);
                });
                 // Scroll to bottom after a brief delay to allow rendering
                 setTimeout(ui.scrollToBottom, 150);
             } else {
                // Ensure the initial placeholder is present if history is empty
                 elements.chatBox.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8">Start a new conversation</div>';
             }
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            // Ensure libraries are loaded before using them
            if (typeof marked === 'undefined') {
                console.error('Marked library failed to load!');
                // Optionally display an error to the user
            }
             if (typeof DOMPurify === 'undefined') {
                console.error('DOMPurify library failed to load!');
            }

            populateModelSelect();
            loadSavedMessages();
            ui.updateModelIndicator();
            ui.adjustTextAreaHeight();
            ui.toggleSendButton(false); // Start with send disabled
            ui.updateChatHistoryUI(); // Placeholder call
        });

    </script>
</body>
</html>
