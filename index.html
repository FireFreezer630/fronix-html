<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fronix AI Chatbot</title>
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="chatbot-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-button">
                    <i data-lucide="plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <nav class="conversation-history">
                <p class="history-title">Recent</p>
                <ul id="conversation-list">
                    <li class="conversation-item active">
                        <a href="#" class="conversation-link">
                            <span>Welcome</span>
                        </a>
                        <div class="conversation-actions">
                            <button class="action-btn rename-btn" aria-label="Rename conversation"><i data-lucide="file-pen-line"></i></button>
                            <button class="action-btn delete-btn" aria-label="Delete conversation"><i data-lucide="trash-2"></i></button>
                        </div>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <!-- Sidebar Overlay for mobile -->
        <div class="sidebar-overlay"></div>

        <!-- Main Chat Area -->
        <div class="chat-area-wrapper">
            <header class="chatbot-header">
                <div class="header-left">
                    <button class="icon-button sidebar-toggle-button" aria-label="Toggle sidebar">
                        <i data-lucide="panel-left"></i>
                    </button>
                    <div class="logo">
                        <div class="logo-icon-wrapper">
                            <span class="material-symbols-outlined">
                                all_inclusive
                            </span>
                        </div>
                        <span>Fronix</span>
                    </div>
                </div>
                <div class="user-profile">
                    <i data-lucide="user"></i>
                </div>
            </header>

            <section class="chat-content">
                <div id="welcome-screen">
                    <div class="app-icon">
                        <div class="logo-icon-wrapper">
                            <span class="material-symbols-outlined">
                                all_inclusive
                            </span>
                        </div>
                    </div>
                    <p class="greeting">Hi, User</p>
                    <h1>Can I help you with anything?</h1>
                </div>
                <div id="message-log" class="hidden"></div>
            </section>

            <footer class="chat-input-area">
                <div id="image-preview-container"></div>
                <div class="input-wrapper">
                    <button class="icon-button web-search-button" aria-label="Web search">
                        <i data-lucide="globe"></i>
                    </button>
                    <label for="file-input" class="icon-button attach-button" aria-label="Attach file">
                        <i data-lucide="paperclip"></i>
                    </label>
                    <input type="file" id="file-input" accept="image/*" class="hidden-input">
                    <input type="text" id="chat-input" placeholder="Ask Fronix anything...">
                </div>
                <button class="send-button">
                    <i data-lucide="send"></i>
                </button>
            </footer>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="close-settings-btn" class="icon-button"><i data-lucide="x"></i></button>
                </div>
                <div class="modal-body">
                    <label for="system-prompt">System Prompt</label>
                    <textarea id="system-prompt" placeholder="You are a helpful assistant."></textarea>
                    
                    <label for="model-select">Model</label>
                    <!-- UPDATED: Default model changed -->
                    <input type="text" id="model-select" value="openai">

                    <label for="theme-toggle">Dark Mode</label>
                    <input type="checkbox" id="theme-toggle">
                </div>
            </div>
        </div>
    </main>

    <!-- Lucide Icons script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>

</body>
</html>
