<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Markdown & Sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.3.10/dist/purify.min.js"></script>

    <!-- highlight.js Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- KaTeX Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1tBCETKfPfpvsctZzmufuMAQK/GK" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>

    <style>
        /* General Styles */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .message-bubble { max-width: min(calc(100% - 2rem), 52rem); word-wrap: break-word; }

        /* Base Markdown Styling */
        .message-content { line-height: 1.6; }
        .message-content > *:first-child { margin-top: 0; } .message-content > *:last-child { margin-bottom: 0; }
        .message-content h1, .message-content h2, .message-content h3 { margin-top: 1.2em; margin-bottom: 0.6em; font-weight: 600; line-height: 1.3; }
        .message-content h1 { font-size: 1.5em; } .message-content h2 { font-size: 1.25em; } .message-content h3 { font-size: 1.1em; }
        .message-content p { margin-bottom: 0.8em; }
        .message-content ul, .message-content ol { padding-left: 1.75rem; margin-bottom: 0.8em; }
        .message-content ul { list-style-type: disc; } .message-content ol { list-style-type: decimal; }
        .message-content li { margin-bottom: 0.3em; }
        .message-content blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; margin: 0.8em 0; font-style: italic; color: #6b7280; }
        .dark .message-content blockquote { border-left-color: #4b5563; color: #9ca3af; }
        .message-content a { color: #3b82f6; text-decoration: underline; } .dark .message-content a { color: #60a5fa; }
        .message-content hr { border-top: 1px solid #e5e7eb; margin: 1.5em 0; } .dark .message-content hr { border-top-color: #374151; }
        .message-content table { border-collapse: collapse; margin: 1em 0; width: auto; }
        .message-content th, .message-content td { border: 1px solid #d1d5db; padding: 0.5em 0.8em; } .dark .message-content th, .dark .message-content td { border-color: #4b5563; }
        .message-content th { background-color: #f9fafb; font-weight: 600; } .dark .message-content th { background-color: #374151; }

        /* Code Block Styling */
        .message-content pre { background-color: #2d333b; border-radius: 0.5rem; margin: 0.8em 0; overflow-x: auto; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; line-height: 1.4; position: relative; }
        .message-content pre code.hljs { padding: 1em; display: block; }
        .message-content code:not(pre code) { background-color: rgba(175, 184, 193, 0.2); color: inherit; padding: 0.2em 0.4em; margin: 0 0.1em; border-radius: 0.25rem; font-size: 0.875em; font-family: 'Courier New', Courier, monospace; }
        .dark .message-content code:not(pre code) { background-color: rgba(240, 246, 252, 0.15); }
        .copy-code-button { position: absolute; top: 0.5em; right: 0.5em; padding: 0.25em 0.5em; font-size: 0.75em; background-color: rgba(255, 255, 255, 0.1); color: #ccc; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 0.25rem; cursor: pointer; opacity: 0; transition: opacity 0.2s ease-in-out; z-index: 1; }
        .message-content pre:hover .copy-code-button { opacity: 1; }
        .copy-code-button:hover { background-color: rgba(255, 255, 255, 0.2); } .copy-code-button:active { background-color: rgba(255, 255, 255, 0.3); }

        /* Thinking Block Styling */
        .thinking-block { margin-bottom: 1em; border-left: 3px solid #fbbf24; background-color: #fefce8; padding: 0; border-radius: 0 4px 4px 0; }
        .dark .thinking-block { border-left-color: #f59e0b; background-color: rgba(55, 48, 16, 0.3); }
        .thinking-block summary { cursor: pointer; padding: 0.5em 1em; font-weight: 500; color: #ca8a04; font-size: 0.8rem; list-style: none; display: flex; align-items: center; }
        .dark .thinking-block summary { color: #fcd34d; }
        .thinking-block summary::before { content: '▶'; display: inline-block; margin-right: 0.5em; font-size: 0.7em; transition: transform 0.2s ease-in-out; }
        .thinking-block[open] > summary::before { transform: rotate(90deg); }
        .thinking-block-content { padding: 0.5em 1em 1em 1.5em; font-size: 0.85rem; color: #78350f; opacity: 0.9; border-top: 1px dashed #fde68a; }
        .dark .thinking-block-content { color: #fef3c7; border-top-color: #78350f; }
        .thinking-block-content pre { font-size: 0.8em; padding: 0.5em; background-color: rgba(0,0,0,0.05); white-space: pre-wrap; word-break: break-all; }
        .dark .thinking-block-content pre { background-color: rgba(255,255,255,0.05); }

        /* KaTeX Styling */
        .message-content .katex-display > .katex { display: inline-block; text-align: center; }
        .message-content .katex-display { overflow-x: auto; overflow-y: hidden; padding: 0.8em 0; margin: 0.8em 0; /* Add vertical margin */ display: block; text-align: center; }
        .message-content .katex { font-size: 1.05em; }

        /* Blinking Cursor */
        .blinking-cursor { display: inline-block; width: 8px; height: 1.1em; background-color: currentColor; margin-left: 1px; border-radius: 1px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 font-sans">
    <div class="flex flex-col h-full">
         <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center">
                <button id="menu-btn" title="Toggle Sidebar" class="lg:hidden mr-4 text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <h1 class="text-xl font-semibold text-gray-800 dark:text-white">Fronix</h1>
            </div>
            <select id="model-select" class="bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white px-3 py-2 rounded-lg text-sm border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <!-- Options populated by JS -->
            </select>
        </header>

        <div class="flex flex-1 overflow-hidden">
             <aside id="sidebar" class="bg-gray-50 dark:bg-gray-800 w-64 border-r dark:border-gray-700 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 fixed lg:relative h-full z-20 flex flex-col">
                 <div class="p-4">
                    <button id="new-chat" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg flex items-center justify-center text-sm font-medium shadow-sm transition-colors">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        New Chat
                    </button>
                    <div class="mt-5">
                        <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
                        <label for="image-upload" class="cursor-pointer flex items-center text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors text-sm py-2">
                            <svg class="w-5 h-5 mr-2 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            Upload Images
                        </label>
                    </div>
                </div>
                 <div class="flex-1 overflow-y-auto p-4 border-t dark:border-gray-700 mt-2">
                     <h2 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">History</h2>
                     <div id="chat-history" class="space-y-1">
                         <p class="text-xs text-gray-400 dark:text-gray-500 px-1">No history yet.</p>
                     </div>
                 </div>
            </aside>

             <main class="flex-1 flex flex-col overflow-hidden bg-white dark:bg-gray-900">
                <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <div class="text-center text-gray-500 dark:text-gray-400 py-8 text-sm">Start a new conversation</div>
                </div>
                 <div class="bg-white dark:bg-gray-800 border-t dark:border-gray-700 p-4">
                    <div id="image-preview" class="flex gap-2 mb-2 overflow-x-auto pb-2"></div>
                    <div class="relative message-bubble mx-auto flex items-center gap-2 bg-gray-100 dark:bg-gray-700 rounded-2xl px-2 py-1 border border-gray-200 dark:border-gray-600">
                        <label for="image-upload" title="Upload Images" class="cursor-pointer text-gray-500 dark:text-gray-400 hover:text-blue-500 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                        </label>
                        <textarea id="user-input" rows="1"
                            class="flex-1 bg-transparent text-gray-900 dark:text-white py-2 px-2 resize-none overflow-hidden focus:outline-none placeholder-gray-500 dark:placeholder-gray-400"
                            placeholder="Type your message..."
                            style="max-height: 200px"></textarea>
                        <button id="send-btn" title="Send Message" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200 ease-in-out" disabled>
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                               <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 16.571V11.5a1 1 0 112 0v5.071a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const config = { MAX_INPUT_LENGTH: 4000, API_ENDPOINT: "https://text.pollinations.ai/openai/v1/chat/completions", MODELS: { 'openai-large': { name: 'OpenAI Large', premium: true }, 'openai': { name: 'OpenAI', premium: false }, 'qwen-reasoning': { name: 'Qwen Reasoning', premium: false }, 'gemini': { name: 'Gemini', premium: true }, 'gemini-thinking': { name: 'Gemini Thinking', premium: true }, }, };
        const VISION_MODELS = ['openai-large', 'openai'];

        // --- DOM Elements ---
        const elements = { chatBox: document.getElementById('chat-box'), userInput: document.getElementById('user-input'), sendBtn: document.getElementById('send-btn'), newChatBtn: document.getElementById('new-chat'), modelSelect: document.getElementById('model-select'), imageUpload: document.getElementById('image-upload'), sidebar: document.getElementById('sidebar'), menuBtn: document.getElementById('menu-btn'), imagePreview: document.getElementById('image-preview'), chatHistory: document.getElementById('chat-history') };

        // --- Populate Model Select ---
        function populateModelSelect() { elements.modelSelect.innerHTML = ''; const keys=Object.keys(config.MODELS); const ordered=['openai-large','openai',...keys.filter(k=>k!=='openai-large'&&k!=='openai')]; ordered.forEach(id=>{if(config.MODELS[id]){const o=document.createElement('option');o.value=id;o.textContent=config.MODELS[id].name+(config.MODELS[id].premium?' ✨':'');elements.modelSelect.appendChild(o);}}); if(ordered.length>0&&config.MODELS[ordered[0]])elements.modelSelect.value=ordered[0]; else if(keys.length>0)elements.modelSelect.value=keys[0]; }

        // --- Application State ---
        let state = { isProcessing: false, messages: JSON.parse(localStorage.getItem('chatMessages') || '[]'), uploadedImages: [], currentAbortController: null };

        // --- Security, Utilities, Markdown, Math ---
        const utilities = {
             extractAndCleanThinkBlocks: (rawContent) => { if(typeof rawContent!=='string')return{cleanedContent:'',thinkHtml:''}; const blocks=[]; const regex=/<think>([\s\S]*?)<\/think>/g; const cleaned=rawContent.replace(regex,(_,c)=>{if(c.trim())blocks.push(c.trim());return '';}).trim(); let html=''; if(blocks.length>0){ html='<details class="thinking-block"><summary>Show Thoughts</summary><div class="thinking-block-content">'; blocks.forEach((b,i)=>{html+=`<pre>${security.basicSanitize(b)}</pre>`; if(i<blocks.length-1)html+='<hr class="my-2 border-dashed border-amber-300 dark:border-amber-700">'; }); html+='</div></details>'; } return {cleanedContent:cleaned,thinkHtml:html}; },
             // Simplified: Only convert [...] to $$...$$ if found
             preprocessMathTags: (content) => {
                 if (typeof content !== 'string') return '';
                 // Convert `[`content`]` to `$$`content`$$` non-greedily
                 try {
                     return content.replace(/\[([\s\S]+?)\]/g, '$$$1$$');
                 } catch (e) {
                     console.error("Error during math tag preprocessing:", e);
                     return content; // Return original content on error
                 }
             },
             renderMathInElement: (element) => {
                 // Check if KaTeX's auto-render function is loaded
                 if (typeof renderMathInElement === 'function') {
                     try {
                         console.log("Attempting KaTeX auto-render on:", element); // Debug log
                         renderMathInElement(element, {
                             delimiters: [ {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true} ],
                             throwOnError: false // Don't halt execution on a single bad formula
                         });
                         console.log("KaTeX auto-render finished for:", element); // Debug log
                     } catch (error) { console.error("KaTeX renderMathInElement error:", error); }
                 } else {
                      // Check again later if deferred script hasn't loaded yet
                      if (document.readyState === 'complete') {
                           console.warn("KaTeX auto-render function (renderMathInElement) not found after DOM load.");
                      } else {
                           console.warn("KaTeX auto-render function not available yet, will check again.");
                      }
                 }
             },
             addCopyButtonsToCodeBlocks: (parentElement) => { try { parentElement.querySelectorAll('pre').forEach(pre=>{ if(pre.querySelector('.copy-code-button')||pre.closest('.thinking-block-content'))return; const code=pre.querySelector('code'); if(!code)return; const btn=document.createElement('button'); btn.className='copy-code-button'; btn.textContent='Copy'; btn.onclick=()=>{navigator.clipboard.writeText(code.textContent).then(()=>{btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy';},2000);}).catch(err=>{console.error('Copy failed:',err);btn.textContent='Error';setTimeout(()=>{btn.textContent='Copy';},2000);});}; pre.appendChild(btn); }); } catch(e){ console.error("Error adding copy buttons:", e); } }
        };

        const security = {
            basicSanitize: (input) => { if(typeof input!=='string')return''; const t=document.createElement('div'); t.textContent=input; return t.innerHTML.replace(/\n/g,'<br>'); },
            // Modified: Calls simplified preprocessMathTags
            renderMarkdown: (markdownContent) => {
                if (typeof markdownContent !== 'string') return '';
                let processedContent = markdownContent;
                try {
                    if (typeof marked==='undefined') throw new Error('Marked missing'); if (typeof DOMPurify==='undefined') throw new Error('DOMPurify missing'); if (typeof hljs==='undefined') console.warn('hljs missing');

                    // 1. Pre-process potentially custom math tags
                    processedContent = utilities.preprocessMathTags(processedContent);
                    // console.log("Content after math preprocess:", processedContent.substring(0, 300)); // Debug log

                    // 2. Parse Markdown
                    const rawHtml = marked.parse(processedContent, { breaks: true, gfm: true });
                    // console.log("HTML after marked:", rawHtml.substring(0, 300)); // Debug log

                    // 3. Sanitize
                    const cleanHtml = DOMPurify.sanitize(rawHtml, { USE_PROFILES: { html: true }, ADD_ATTR: ['target', 'class'] });
                    // console.log("HTML after purify:", cleanHtml.substring(0, 300)); // Debug log

                    // 4. Apply Syntax Highlighting + Target Blank
                    const tempDiv = document.createElement('div'); tempDiv.innerHTML = cleanHtml;
                    tempDiv.querySelectorAll('a').forEach(a=>{if(a.href&&!a.target){a.target='_blank';a.rel='noopener noreferrer';}});
                    if(typeof hljs!=='undefined'){ tempDiv.querySelectorAll('pre code').forEach((block)=>{try{hljs.highlightElement(block);}catch(e){console.error("hljs error:",e);}}); }

                    return tempDiv.innerHTML; // Return HTML ready for KaTeX pass
                } catch (error) {
                    console.error("Markdown/Highlight err:", error, "Input:", markdownContent.substring(0, 200));
                    return security.basicSanitize(processedContent); // Fallback sanitize pre-processed content
                }
            },
            validateInput: (input) => { if(input.length>config.MAX_INPUT_LENGTH)throw new Error(`Input > ${config.MAX_INPUT_LENGTH} chars`); return true; }
        };

        // --- UI Management ---
        const ui = {
            createMessageElement: (processedResult, isUser = false, role = 'assistant') => { const wrapper = document.createElement('div'); wrapper.className = `flex ${isUser?'justify-end':'justify-start'} mb-4`; const bubble=document.createElement('div'); bubble.className = `message-bubble rounded-lg p-3.5 text-sm shadow ${isUser?'ml-auto bg-blue-600 text-white':'bg-white dark:bg-gray-700 text-gray-900 dark:text-white'}`; const contentDiv=document.createElement('div'); contentDiv.className='message-content flex flex-col gap-0'; if(role==='error'){ bubble.classList.remove('bg-white','dark:bg-gray-700','bg-blue-600');bubble.classList.add('bg-red-100','dark:bg-red-800','text-red-800','dark:text-red-100','border','border-red-200','dark:border-red-600');contentDiv.innerHTML=`⚠️ ${security.basicSanitize(processedResult)}`; } else if(isUser&&Array.isArray(processedResult)){ processedResult.forEach(item=>{if(item.type==='text'){const t=document.createElement('div');t.innerHTML=security.basicSanitize(item.text||"");contentDiv.appendChild(t);}else if(item.type==='image_url'&&item.image_url?.url){const i=document.createElement('img');i.src=item.image_url.url;i.alt="User image";i.className='max-w-xs h-auto rounded-md mt-1 border dark:border-gray-600';i.style.maxHeight='200px';contentDiv.appendChild(i);}}); } else if(role==='assistant'&&typeof processedResult==='object'&&processedResult.renderedMarkdown!==undefined){ contentDiv.innerHTML = processedResult.thinkHtml + processedResult.renderedMarkdown; } else if(role==='loading'&&typeof processedResult==='string'){ contentDiv.innerHTML=`<span class="streaming-text"></span><span class="blinking-cursor"></span>`; } else { console.warn("createMsg unexpected:", processedResult); contentDiv.innerHTML=security.basicSanitize(String(processedResult)); } bubble.appendChild(contentDiv); wrapper.appendChild(bubble); return wrapper; },
             updateStreamingMessage: (element, deltaContent, isFinished = false) => { const contentDiv = element.querySelector('.message-content'); const textSpan = element.querySelector('.streaming-text'); const cursorSpan = element.querySelector('.blinking-cursor'); if (!contentDiv || !textSpan || !cursorSpan) { console.error("Streaming structure invalid!"); return; } const wasNearBottom = ui.isScrolledToBottom(15); /* Increased threshold slightly */ if (isFinished) { cursorSpan.remove(); textSpan.remove(); const finalRaw = textSpan.textContent; const { cleanedContent, thinkHtml } = utilities.extractAndCleanThinkBlocks(finalRaw); const renderedMarkdown = security.renderMarkdown(cleanedContent); contentDiv.innerHTML = thinkHtml + renderedMarkdown; try { utilities.renderMathInElement(contentDiv); } catch(e){console.error("KaTeX final render err:", e);} try { utilities.addCopyButtonsToCodeBlocks(contentDiv); } catch(e){console.error("CopyBtn final err:", e);} } else { const temp=document.createElement('div'); temp.textContent=deltaContent; textSpan.innerHTML += temp.innerHTML.replace(/\n/g,'<br>'); } if(wasNearBottom){ requestAnimationFrame(()=>{ ui.scrollToBottom(); }); } },
             createStreamingMessageElement: () => { const e = ui.createMessageElement('', false, 'loading'); e.id = 'streaming-message'; elements.chatBox.appendChild(e); ui.scrollToBottom(); return e; },
             isScrolledToBottom: (threshold = 5) => { const el = elements.chatBox; return Math.abs(el.scrollHeight - el.scrollTop - el.clientHeight) < threshold; },
             updateModelIndicator: () => { if(!elements.modelSelect.value||!config.MODELS[elements.modelSelect.value]){console.warn("Model select invalid.");document.title="Fronix";return;} const m=config.MODELS[elements.modelSelect.value];document.title=`${m.name} - Fronix`; },
             scrollToBottom: () => { elements.chatBox.scrollTo({ top: elements.chatBox.scrollHeight, behavior: 'smooth' }); },
             toggleSendButton: (enabled) => { elements.sendBtn.disabled = !enabled; },
             clearInput: () => { elements.userInput.value = ''; state.uploadedImages = []; elements.imagePreview.innerHTML = ''; ui.adjustTextAreaHeight(); ui.toggleSendButton(false); },
             adjustTextAreaHeight: () => { elements.userInput.style.height='auto'; const maxH=parseInt(elements.userInput.style.maxHeight||'200px',10); const scrollH=elements.userInput.scrollHeight; const newH=Math.min(scrollH,maxH)+(scrollH>maxH?0:2); elements.userInput.style.height=`${newH}px`; },
             displayError: (message) => { const errDiv = ui.createMessageElement(message, false, 'error'); elements.chatBox.appendChild(errDiv); ui.scrollToBottom(); },
             addImagePreview: (name, src) => { const c=document.createElement('div'); c.className='relative group flex-shrink-0'; const i=document.createElement('img'); i.src=src; i.alt=name; i.title=name; i.className='w-16 h-16 object-cover rounded-lg border border-gray-300 dark:border-gray-600 cursor-pointer'; i.onclick=()=>window.open(src,'_blank'); const b=document.createElement('button'); b.innerHTML='&times;'; b.title="Remove image"; b.className='absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity focus:opacity-100'; b.onclick=(e)=>{e.stopPropagation(); state.uploadedImages=state.uploadedImages.filter(img=>img.base64!==src); c.remove(); if(elements.userInput.value.trim()===''&&state.uploadedImages.length===0)ui.toggleSendButton(false); if(state.uploadedImages.length===0)elements.imageUpload.value='';}; c.appendChild(i); c.appendChild(b); elements.imagePreview.appendChild(c); ui.toggleSendButton(true); },
             updateChatHistoryUI: () => { console.log("UI: History UI update (not implemented)"); }
        };

        // --- Chat Logic ---
        const chat = {
            sendMessage: async () => {
                 if (state.isProcessing) return; let userText=elements.userInput.value.trim(); let msgContent=[]; if (!userText && state.uploadedImages.length===0) return; state.isProcessing=true; ui.toggleSendButton(false); const model=elements.modelSelect.value; const vision=VISION_MODELS.includes(model); if(state.uploadedImages.length>0){ if(!vision){ui.displayError(`Model '${config.MODELS[model].name}' doesn't support images.`);state.isProcessing=false;ui.toggleSendButton(userText!==''||state.uploadedImages.length>0);return;} state.uploadedImages.forEach(img=>{msgContent.push({type:'image_url',image_url:{url:img.base64,detail:"auto"}});}); } if(userText){try{security.validateInput(userText);msgContent.push({type:'text',text:userText});}catch(e){ui.displayError(e.message);state.isProcessing=false;ui.toggleSendButton(true);return;}} const userMsg={role:'user',content:msgContent}; state.messages.push(userMsg); if(elements.chatBox.querySelector('.text-center'))elements.chatBox.innerHTML=''; const userDiv=ui.createMessageElement(msgContent, true, 'user'); elements.chatBox.appendChild(userDiv); ui.clearInput(); ui.scrollToBottom();

                localStorage.setItem('chatMessages', JSON.stringify(state.messages));
                const assistantMessageDiv = ui.createStreamingMessageElement();
                let accumulatedDeltaContentForFinish = '';

                state.currentAbortController = new AbortController();
                try {
                    const requestBody = { model: model, messages: state.messages, stream: true, referrer: "Fronix.ai" }; console.log('Sending:', JSON.stringify(requestBody, null, 2));
                    const response = await fetch(config.API_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody), signal: state.currentAbortController.signal });
                    if (!response.ok) { let eB=await response.text(); try {eB=JSON.stringify(JSON.parse(eB),null,2);} catch(e){} console.error("API Err Body:",eB); throw new Error(`API Error: ${response.status} ${response.statusText}.`); } const cT=response.headers.get('content-type'); if (!cT||!cT.includes('text/event-stream')||!response.body) { throw new Error('Expected text/event-stream.'); }

                    const reader = response.body.getReader(); const decoder = new TextDecoder('utf-8'); let buffer = '';
                    while (true) {
                        const { value, done } = await reader.read(); if (done) { console.log('Stream done.'); break; }
                        buffer += decoder.decode(value, { stream: true }); let lines = buffer.split('\n'); buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue; const data = line.substring(6); if (data === '[DONE]') { console.log('[DONE] received.'); continue; }
                            try {
                                const parsed = JSON.parse(data); const delta = parsed.choices?.[0]?.delta; if (!delta || !delta.content) continue;
                                const deltaContent = delta.content;
                                accumulatedDeltaContentForFinish += deltaContent;
                                ui.updateStreamingMessage(assistantMessageDiv, deltaContent, false);
                            } catch (e) { console.error('Stream parse err:', data, e); }
                        }
                    }

                    // Finalize: Pass accumulated raw content for final processing
                    ui.updateStreamingMessage(assistantMessageDiv, accumulatedDeltaContentForFinish, true);
                    const finalAssistantMessage = { role: 'assistant', content: accumulatedDeltaContentForFinish };
                    if (finalAssistantMessage.content && finalAssistantMessage.content.trim()) { state.messages.push(finalAssistantMessage); localStorage.setItem('chatMessages', JSON.stringify(state.messages)); }
                    else { console.warn("Stream empty."); assistantMessageDiv.remove(); }
                } catch (error) {
                     console.error('sendMessage error:', error); if (assistantMessageDiv && document.body.contains(assistantMessageDiv)) assistantMessageDiv.remove();
                     if (error.name !== 'AbortError') ui.displayError(error.message || "Unknown error."); else console.log("Request aborted.");
                } finally {
                     state.isProcessing = false; ui.toggleSendButton(elements.userInput.value.trim() !== '' || state.uploadedImages.length > 0); state.currentAbortController = null;
                }
            },
        };

        // --- Event Listeners ---
         elements.sendBtn.addEventListener('click', () => chat.sendMessage());
         elements.userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chat.sendMessage(); } });
         elements.userInput.addEventListener('input', ui.adjustTextAreaHeight);
         elements.userInput.addEventListener('input', () => { ui.toggleSendButton(elements.userInput.value.trim() !== '' || state.uploadedImages.length > 0); });
         elements.newChatBtn.addEventListener('click', () => { if (state.currentAbortController) state.currentAbortController.abort(); state.messages = []; state.uploadedImages = []; localStorage.removeItem('chatMessages'); elements.chatBox.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8 text-sm">Start a new conversation</div>'; ui.clearInput(); ui.updateModelIndicator(); ui.updateChatHistoryUI(); console.log("New chat."); });
         elements.imageUpload.addEventListener('change', (e) => { const files = e.target.files; if (!files || files.length === 0) return; const maxI = 5; const maxMB = 10; if (state.uploadedImages.length + files.length > maxI) { ui.displayError(`Max ${maxI} images.`); e.target.value = ''; return; } const selM = elements.modelSelect.value; if (!VISION_MODELS.includes(selM)) { ui.displayError(`Model '${config.MODELS[selM]?.name || selM}' doesn't support images.`); e.target.value = ''; return; } Array.from(files).forEach(f => { if (!f.type.startsWith('image/')) return; if (f.size > maxMB * 1024 * 1024) { ui.displayError(`"${f.name}" > ${maxMB}MB.`); return; } if (state.uploadedImages.length >= maxI) return; const r = new FileReader(); r.onload = (ev) => { if (state.uploadedImages.length < maxI) { state.uploadedImages.push({ name: f.name, base64: ev.target.result }); ui.addImagePreview(f.name, ev.target.result); } }; r.onerror = () => ui.displayError(`Error reading ${f.name}.`); r.readAsDataURL(f); }); e.target.value = ''; });
         elements.menuBtn.addEventListener('click', () => { elements.sidebar.classList.toggle('-translate-x-full'); });
         elements.modelSelect.addEventListener('change', () => { ui.updateModelIndicator(); if (state.uploadedImages.length > 0 && !VISION_MODELS.includes(elements.modelSelect.value)) ui.displayError(`Warning: Selected model doesn't support images.`); });


        // --- Initial Load ---
        const loadSavedMessages = () => {
             state.messages = (JSON.parse(localStorage.getItem('chatMessages') || '[]')).filter(msg => msg.role !== 'tool');
             localStorage.setItem('chatMessages', JSON.stringify(state.messages));

             if (state.messages.length > 0) {
                 elements.chatBox.innerHTML = '';
                 state.messages.forEach(msg => {
                     let messageDataForUI; let contentDiv = null; // Define contentDiv here
                     if (msg.role === 'user') { let c = []; if (Array.isArray(msg.content)) { c = msg.content.map(item => (item.type === 'text' && (item.text === null || typeof item.text === 'undefined')) ? { ...item, text: "" } : item); } else { c = [{ type: 'text', text: msg.content || "" }]; } messageDataForUI = c; }
                     else if (msg.role === 'assistant') {
                          const rawContent = msg.content || "";
                          const { cleanedContent, thinkHtml } = utilities.extractAndCleanThinkBlocks(rawContent);
                          const renderedMarkdown = security.renderMarkdown(cleanedContent); // Includes pre-process math
                          messageDataForUI = { renderedMarkdown: renderedMarkdown, thinkHtml: thinkHtml };
                     }
                     else { console.warn("Unknown history role:", msg); return; }

                     if (msg.role === 'assistant' && (!messageDataForUI.renderedMarkdown.trim() && !messageDataForUI.thinkHtml.trim())) { console.warn("Skip empty assist history:", msg); return; }
                     if (msg.role === 'user' && (!Array.isArray(messageDataForUI) || messageDataForUI.filter(item => item.type === 'text' && item.text.trim() !== '').length === 0 && messageDataForUI.filter(item => item.type === 'image_url').length === 0)) { console.warn("Skip empty user history:", msg); return; }

                    const messageDiv = ui.createMessageElement(messageDataForUI, msg.role === 'user', msg.role);
                    elements.chatBox.appendChild(messageDiv);

                    // Find contentDiv *after* appending messageDiv
                    contentDiv = messageDiv.querySelector('.message-content');

                    if (msg.role === 'assistant' && contentDiv) {
                         // Apply post-render steps AFTER appending and finding contentDiv
                         try { utilities.renderMathInElement(contentDiv); } catch (e) { console.error("KaTeX load history err:", e); }
                         try { utilities.addCopyButtonsToCodeBlocks(contentDiv); } catch (e) { console.error("CopyBtn load history err:", e); }
                    } else if (msg.role === 'assistant' && !contentDiv) {
                         console.error("Could not find .message-content in loaded assistant message:", messageDiv);
                    }
                 });
                 setTimeout(ui.scrollToBottom, 150);
             } else {
                 elements.chatBox.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8 text-sm">Start a new conversation</div>';
             }
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
             if(typeof marked==='undefined')console.error('Marked.js failed!'); if(typeof DOMPurify==='undefined')console.error('DOMPurify failed!'); if(typeof hljs==='undefined')console.warn('Highlight.js failed!'); else {hljs.configure({ignoreUnescapedHTML:true});console.log("hljs configured.");}
             // Use a flag or interval to wait for KaTeX if necessary, simple check for now
             const katexCheckInterval = setInterval(() => {
                  if(typeof renderMathInElement === 'function') {
                       console.log("KaTeX auto-render ready.");
                       clearInterval(katexCheckInterval);
                       // Re-run rendering on existing messages if needed, though loadSavedMessages should handle it now
                       document.querySelectorAll('.message-content').forEach(el => utilities.renderMathInElement(el));
                  } else {
                      console.log("Waiting for KaTeX auto-render...");
                  }
             }, 200);
             setTimeout(() => clearInterval(katexCheckInterval), 5000); // Stop checking after 5s

            populateModelSelect();
            loadSavedMessages(); // Applies render steps including KaTeX now
            ui.updateModelIndicator();
            ui.adjustTextAreaHeight();
            ui.toggleSendButton(false);
            ui.updateChatHistoryUI();
        });

    </script>
</body>
</html>
